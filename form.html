                <!-- Форма не отправляет данные, только вёрстка -->
                <form id="feedbackForm">
                  <div class="mb-3">
                    <label for="name" class="form-label">Имя</label>
                    <input
                      type="text"
                      class="form-control"
                      id="name"
                      name="name"

                  </div>

                  <div class="mb-3">

                      type="email"
                      class="form-control"
                      id="email"
                      name="email"
                      required
                      placeholder="name@example.com"
                    />
                  </div>

                  <div class="mb-3">
                    <label for="topic" class="form-label">Тема обращения</label>
                    <select class="form-select" id="topic" name="topic" required>
                      <option value="" selected disabled>Выберите тему</option>
                      <option value="1">Предложить рецепт</option>
                      <option value="2">Сообщить об ошибке</option>
                      <option value="3">Другой вопрос</option>
                    </select>
                  </div>

                  <div class="mb-3">
                    <label for="message" class="form-label">Сообщение</label>
                    <textarea
                      class="form-control"
                      id="message"
                      name="message"
                      required
                      rows="4"
                      placeholder="Ваше сообщение..."
                    ></textarea>
                  </div>

                  <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-submit">
                      Отправить
                    </button>
                  </div>
                </form>
