      <!-- Контент -->
      <main class="py-4">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-10">
              <div class="recipe-form-card">
                <form id="recipeForm" enctype="multipart/form-data">
                  <div class="mb-3">
                    <label
                      for="recipeTitle"
                      class="recipe-form-label-main d-block text-center"
                    >
                      Название рецепта
                    </label>
                    <input
                      type="text"
                      class="form-control recipe-form-input"
                      id="recipeTitle"
                      name="title"
                      required
                      maxlength="255"
                      placeholder="Введите название рецепта"
                    />
                  </div>

                  <div class="row mb-3">
                    <div class="col-md-6 mb-3 mb-md-0">
                      <label
                        for="recipeCategoryDisplay"
                        class="recipe-form-label-sub d-block mb-1"
                      >
                        Категория
                      </label>
                      <div class="recipe-category-field position-relative">
                        <div class="input-group">
                          <input
                            type="text"
                            readonly
                            class="form-control recipe-form-input recipe-category-display"
                            id="recipeCategoryDisplay"
                            placeholder="Нажмите, чтобы выбрать"
                            autocomplete="off"
                            aria-haspopup="listbox"
                            aria-expanded="false"
                          />
                          <button
                            type="button"
                            class="btn btn-outline-secondary recipe-category-toggle"
                            id="recipeCategoryToggle"
                            aria-label="Открыть список категорий"
                            aria-expanded="false"
                          >
                            ▼
                          </button>
                        </div>
                        <input type="hidden" name="category" id="recipeCategoryHidden" value="" />
                        <div
                          class="recipe-category-panel"
                          id="recipeCategoryPanel"
                          role="listbox"
                          aria-hidden="true"
                        >
                          <button
                            type="button"
                            class="recipe-category-option"
                            role="option"
                            data-value="Первое блюдо"
                          >
                            Первое блюдо
                          </button>
                          <button
                            type="button"
                            class="recipe-category-option"
                            role="option"
                            data-value="Второе блюдо"
                          >
                            Второе блюдо
                          </button>
                          <button
                            type="button"
                            class="recipe-category-option"
                            role="option"
                            data-value="Десерт"
                          >
                            Десерт
                          </button>
                          <button
                            type="button"
                            class="recipe-category-option"
                            role="option"
                            data-value="__other__"
                          >
                            Другое
                          </button>
                          <div class="recipe-category-other-wrap d-none mt-2" id="recipeCategoryOtherWrap">
                            <label for="recipeCategoryOther" class="form-label small mb-1"
                              >Своя категория</label
                            >
                            <input
                              type="text"
                              class="form-control form-control-sm"
                              id="recipeCategoryOther"
                              placeholder="Введите с клавиатуры"
                              maxlength="120"
                              autocomplete="off"
                            />
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <label
                        for="recipeShort"
                        class="recipe-form-label-sub d-block"
                      >
                        Описание
                      </label>
                      <input
                        type="text"
                        class="form-control recipe-form-input"
                        id="recipeShort"
                        name="short"
                        placeholder="Краткое описание"
                      />
                    </div>
                  </div>

                  <div class="mb-3">
                    <label
                      for="recipeText"
                      class="recipe-form-label-main d-block text-center"
                    >
                      Ингридиенты и способ приготовления
                    </label>
                    <textarea
                      class="form-control recipe-form-textarea"
                      id="recipeText"
                      name="text"
                      required
                      placeholder="Опишите ингредиенты и шаги приготовления"
                    ></textarea>
                  </div>

                  <div
                    class="recipe-form-buttons d-flex flex-column align-items-center gap-2 mt-4"
                  >
                    <label class="btn btn-main mb-1">
                      Загрузить фото
                      <input
                        type="file"
                        class="d-none"
                        id="recipePhoto"
                        name="photo"
                      />
                    </label>
                    <button type="submit" class="btn btn-main">
                      Сохранить рецепт
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
