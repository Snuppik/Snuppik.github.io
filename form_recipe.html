<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Кулинарная книга – Добавить рецепт</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Шапка -->
      <header>
        <nav class="navbar navbar-expand-lg navbar-custom">
          <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
              <img
                src="logo.png"
                alt="Логотип"
                class="navbar-brand-logo-img"
              />
              <span class="navbar-brand-text">Кулинарная книга</span>
            </a>
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mainNavbar"
              aria-controls="mainNavbar"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
              <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                <li class="nav-item">
                  <a class="nav-link" href="index.html">Главная</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="list.html">Рецепты</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="form.html">Контакты</a>
                </li>
              </ul>
              <div class="d-none d-lg-block">
                <img src="search.png" alt="Поиск" class="nav-search-img" />
              </div>
            </div>
          </div>
        </nav>
      </header>

      <!-- Контент -->
      <main class="py-4">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-10">
              <div class="recipe-form-card">
                <form
                  action="recipe.html"
                  method="get"
                  enctype="multipart/form-data"
                >
                  <div class="mb-3">
                    <label
                      for="recipeTitle"
                      class="recipe-form-label-main d-block text-center"
                    >
                      Название рецепта
                    </label>
                    <input
                      type="text"
                      class="form-control recipe-form-input"
                      id="recipeTitle"
                      name="title"
                      placeholder="Введите название рецепта"
                    />
                  </div>

                  <div class="row mb-3">
                    <div class="col-md-6 mb-3 mb-md-0">
                      <label
                        for="recipeCategory"
                        class="recipe-form-label-sub d-block"
                      >
                        Категория
                      </label>
                      <input
                        type="text"
                        class="form-control recipe-form-input"
                        id="recipeCategory"
                        name="category"
                        placeholder="Например, десерт"
                      />
                    </div>
                    <div class="col-md-6">
                      <label
                        for="recipeShort"
                        class="recipe-form-label-sub d-block"
                      >
                        Описание
                      </label>
                      <input
                        type="text"
                        class="form-control recipe-form-input"
                        id="recipeShort"
                        name="short"
                        placeholder="Краткое описание"
                      />
                    </div>
                  </div>

                  <div class="mb-3">
                    <label
                      for="recipeText"
                      class="recipe-form-label-main d-block text-center"
                    >
                      Ингридиенты и способ приготовления
                    </label>
                    <textarea
                      class="form-control recipe-form-textarea"
                      id="recipeText"
                      name="text"
                      placeholder="Опишите ингредиенты и шаги приготовления"
                    ></textarea>
                  </div>

                  <div
                    class="recipe-form-buttons d-flex flex-column align-items-center gap-2 mt-4"
                  >
                    <label class="btn btn-main mb-1">
                      Загрузить фото
                      <input
                        type="file"
                        class="d-none"
                        id="recipePhoto"
                        name="photo"
                      />
                    </label>
                    <button type="submit" class="btn btn-main">
                      Сохранить рецепт
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Футер -->
      <footer class="site-footer">
        <div class="container">
          <div class="row align-items-center">
            <div class="col-md-4 mb-4 mb-md-0">
              <h5>Контакты</h5>
              <p class="mb-1">тел.: 8&nbsp;991&nbsp;196&nbsp;68&nbsp;58</p>
              <p class="mb-0">
                email :
                <a href="mailto:ilya.markov.06@list.ru">ilya.markov.06@list.ru</a>
              </p>
            </div>
            <div class="col-md-4 mb-4 mb-md-0 text-center">
              <img src="qr_code.png" alt="QR-код" class="qr-img" />
            </div>
            <div class="col-md-4 footer-copy">
              <p class="mb-0">
                © 2026 Кулинарная книга.<br />
                Все права защищены.
              </p>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
